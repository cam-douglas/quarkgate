name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: quarkgate
          POSTGRES_PASSWORD: quarkgate
          POSTGRES_DB: quarkgate
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Go test
        run: go test ./...
      - name: Validate driver manifests
        run: npm run validate:manifests
      - name: Driver contract tests
        run: npm run test:drivers
      - name: Migrate
        env:
          DATABASE_URL: postgres://quarkgate:quarkgate@localhost:5433/quarkgate?sslmode=disable
        run: go run ./cmd/admin migrate
