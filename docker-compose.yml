services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quarkgate
      POSTGRES_PASSWORD: quarkgate
      POSTGRES_DB: quarkgate
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quarkgate"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kuzu-bridge:
    build:
      context: .
      dockerfile: services/kuzu-bridge/Dockerfile
    ports:
      - "8093:8093"
    environment:
      KUZU_ENABLED: "true"
      KUZU_DB_PATH: /data/kuzu/memory_graph.kuzu
    volumes:
      - kuzudata:/data/kuzu

volumes:
  pgdata:
  kuzudata:
